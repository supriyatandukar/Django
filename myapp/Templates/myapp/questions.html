<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial; margin: 0;
               background: linear-gradient(135deg, #667eea, #764ba2); }
        .box { max-width: 700px; margin: 50px auto;
               background: white; border-radius: 15px;
               box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: #667eea; color: white;
                  padding: 40px; text-align: center; }
        .content { padding: 40px; }
        .features { display: grid; grid-template-columns: 1fr 1fr;
                    gap: 15px; margin-top: 20px; }
        .card { background: #f0f0f0; padding: 15px;
                border-radius: 8px; border-left: 4px solid #667eea; }
        .choice-btn { display: block; width: 100%; text-align: left;
                     padding: 10px 12px; margin: 6px 0;
                     background: white; border: 1px solid #ccc;
                     border-radius: 6px; cursor: pointer; }
        .choice-btn:hover { background: #f7f7f7; }
        nav { background: #333; padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
    </style>
</head>
<body>
    <div class='box'>
        <div class='header'>
            <h1>🚀 {{ title }}</h1>
        </div>
        <nav>
            <a href='{% url "home" %}'>Home</a>
            <a href='{% url "about" %}'>About</a>
            <a href='{% url "contact" %}'>Contact</a>
            <a href='{% url "questions" %}'>Questions</a>
        </nav>
        <div class='content'>
            <p style='font-size: 1.2em;'>{{ title }}</p>
            <div class='features'>
                {% for q in questions %}
                <div class='card'>
                    <h3>{{ q.question_text }}</h3>
                    <div>
                        {% for c in q.choice_set.all %}
                        <form method='post' action='{% url "vote" q.id c.id %}' style='margin: 6px 0;'>
                            {% csrf_token %}
                            <button class='choice-btn' type='submit'>
                                {{ c.choice_text }}
                                <span style='color: #666;'>({{ c.votes }} votes)</span>
                            </button>
                        </form>
                        {% endfor %}
                    </div>
                </div>
                {% empty %}
                <div class='card'>No questions available yet.</div>
                {% endfor %}
            </div>
            <p style='margin-top: 30px; color: #666;'>
                &copy; 2026 Django Workshop
            </p>
        </div>
    </div>
</body>
</html>
