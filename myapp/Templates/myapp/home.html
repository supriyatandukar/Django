<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial; margin: 0;
               background: linear-gradient(135deg, #667eea, #764ba2); }
        .box { max-width: 700px; margin: 50px auto;
               background: white; border-radius: 15px;
               box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: #667eea; color: white;
                  padding: 40px; text-align: center; }
        .content { padding: 40px; }
        .features { display: grid; grid-template-columns: 1fr 1fr;
                    gap: 15px; margin-top: 20px; }
        .card { background: #f0f0f0; padding: 15px;
                border-radius: 8px; border-left: 4px solid #667eea; }
        nav { background: #333; padding: 15px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
    </style>
</head>
<body>
    <div class='box'>
        <div class='header'>
            <h1>🚀 {{ title }}</h1>
        </div>
        <nav>
            <a href='{% url "home" %}'>Home</a>
            <a href='{% url "hello" %}'>Hello</a>
            <a href='{% url "about" %}'>About</a>
            <a href='{% url "contact" %}'>Contact</a>
            <a href='{% url "questions" %}'>Questions</a>
        </nav>
        <div class='content'>
            <p style='font-size: 1.2em;'>{{ message }}</p>
            <h2>Why Django?</h2>
            <div class='features'>
                {% for f in features %}
                <div class='card'>✓ {{ f }}</div>
                {% endfor %}
            </div>
            <p style='margin-top: 30px; color: #666;'>
                &copy; {{ year }} Django Workshop
            </p>
        </div>
    </div>
</body>
</html>
